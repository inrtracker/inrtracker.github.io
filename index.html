<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INR-Tracker: Data Viewer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1c1c1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input { background: #2c2c2e; color: white; }
        input::placeholder { color: #8e8e93; }
        button { background: #ff9500; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #e08400; }
        .entry { background: #2c2c2e; padding: 12px; margin: 8px 0; border-radius: 6px; border-left: 4px solid #ff9500; }
        .description { color: #8e8e93; font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="ui-title">INR-Tracker Daten-Decoder</h2>
    <p id="ui-description" class="description">Lw_desc</p>
    
    <input type="text" id="encryptedInput">
    <input type="password" id="pinInput">
    <button id="ui-button" onclick="decryptPayload()">Daten entschlüsseln</button>

    <div id="output" style="margin-top: 20px;"></div>
</div>

<script>
// 1. Sprach-Datenbank (Deutsch & Englisch)
const translations = {
    de: {
        title: "INR-Tracker Daten-Decoder",
        description: "Diese Seite läuft komplett lokal im Browser Ihres Praxis-PCs. Es werden keine Daten ins Internet übertragen. Fügen Sie den Inhalt des gescannten QR-Codes ein und geben Sie die PIN ein, die der Patient in seiner App festgelegt hat.",
        placeholderQR: "Hier den Text aus dem QR-Code einfügen",
        placeholderPin: "4-stellige PIN des Patienten",
        button: "Daten entschlüsseln",
        success: "Erfolgreich entschlüsseln:",
        error: "Fehler: Falsche PIN oder beschädigte Daten.",
        date: "Datum",
        inr: "INR",
        dosis: "Dosis"
    },
    en: {
        title: "INR-Tracker Data Decoder",
        description: "This page runs entirely locally in your browser. No data is transmitted over the internet. Paste the content of the scanned QR code and enter the PIN set by the patient in their app.",
        placeholderQR: "Paste the QR code text here",
        placeholderPin: "Patient's 4-digit PIN",
        button: "Decrypt Data",
        success: "Successfully Decrypted:",
        error: "Error: Incorrect PIN or corrupted data.",
        date: "Date",
        inr: "INR",
        dosis: "Dosage"
    }
};

// 2. Erkennen der Sprache des Browsers (Standard ist Englisch, falls nicht Deutsch)
const userLang = navigator.language.startsWith('de') ? 'de' : 'en';
const lang = translations[userLang];

// 3. UI-Texte beim Laden dynamisch setzen
document.getElementById('ui-title').innerText = lang.title;
document.getElementById('ui-description').innerText = lang.description;
document.getElementById('encryptedInput').placeholder = lang.placeholderQR;
document.getElementById('pinInput').placeholder = lang.placeholderPin;
document.getElementById('ui-button').innerText = lang.button;

// 4. Krypto-Logik bleibt gleich, nutzt aber übersetzte Ausgabetexte
async function decryptPayload() {
    const base64String = document.getElementById('encryptedInput').value;
    const pin = document.getElementById('pinInput').value;
    const outputDiv = document.getElementById('output');
    
    try {
        const combinedData = Uint8Array.from(atob(base64String), c => c.charCodeAt(0));
        const salt = new Uint8Array(16); // Muss exakt zu deinem Swift-Salt passen
        
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]
        );
        
        const key = await window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
        );
        
        const nonce = combinedData.slice(0, 12);
        const ciphertextWithTag = combinedData.slice(12);
        
        const decryptedBuffer = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: nonce },
            key,
            ciphertextWithTag
        );
        
        const decryptedText = new TextDecoder().decode(decryptedBuffer);
        const jsonData = JSON.parse(decryptedText);
        
        // Tabellen- / Listenaufbau mit lokalisierten Begriffen
        outputDiv.innerHTML = `<h3>${lang.success}</h3>`;
        jsonData.forEach(entry => {
            // Falls deine JSON-Keys z.B. "date", "inr" und "dosage" heißen:
            outputDiv.innerHTML += `
                <div class="entry">
                    <b>${lang.date}:</b> ${entry.date} | 
                    <b>${lang.inr}:</b> ${entry.inr} | 
                    <b>${lang.dosis}:</b> ${entry.dosage || entry.dosis || '-'}
                </div>`;
        });
        
    } catch (error) {
        outputDiv.innerHTML = `<p style='color: #ff453a;'>${lang.error}</p>`;
        console.error(error);
    }
}
</script>
</body>
</html>
